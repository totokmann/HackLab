<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackLab</title>
    <link rel="stylesheet" href="css/notes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-user">
            <button>User</button>
        </div>
        <div class="navbar-search">
            <input type="text" placeholder="Buscar...">
        </div>
        <button id="toggle-sidebar" class="toggle-sidebar">
            <i class="fas fa-bars"></i>
        </button>
    </nav>
    <div class="container">
        <aside class="sidebar" id="sidebar">
            <div class="levels">
                <h2>Levels</h2>
                <ul>
                    <li>Trainee</li>
                    <li>Junior</li>
                    <li>SemiSenior</li>
                    <li>Senior</li>
                </ul>
            </div>
            <div class="options">
                <h2>Advance</h2>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="listado_tabla.html">All Products Table</a></li>
                    <li><a href="listado_box.html">All Products Box</a></li>
                </ul>
            </div>
        </aside>
        <main class="notes">
            <h1>Notes</h1>
            <div class="console-output" id="console-output"></div>
            <div class="console-input">
                <span class="console-prompt">nombre_de_usuario@nivel:~$</span>
                <input id="console-input" type="text" placeholder="Escribe tu comando..." onkeydown="handleInput(event)">
            </div>
        </main>        
    </div>
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2024 HackLab.</p>
            <p>Contact: <a href="mailto:info@yourcompany.com">tomasezequielkugelmann@gmail.com</a></p>
        </div>
    </footer>

    <script>
        // Script para alternar la visibilidad del sidebar
        document.getElementById('toggle-sidebar').addEventListener('click', function() {
            var sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('active');
        });

        // Script para manejar la entrada de la consola
        function handleInput(event) {
            const input = document.getElementById('console-input');
            const output = document.getElementById('console-output');

            // Detectar la tecla "Enter"
            if (event.key === 'Enter') {
                event.preventDefault(); // Evitar el salto de línea

                const inputText = input.value.trim();

                if (inputText) {
                    const commandElement = document.createElement('div');
                    commandElement.classList.add('command');
                    commandElement.textContent = `nombre_de_usuario@nivel:~$ ${inputText}`;

                    output.appendChild(commandElement);  // Agregar el comando a la salida

                    // Limpiar el campo de entrada
                    input.value = '';

                    // Asegurar que haga scroll hacia abajo
                    output.scrollTop = output.scrollHeight;
                }

                // Devolver el foco al input para seguir escribiendo
                input.focus();
            }
        }
    </script>
</body>
</html>
